<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>easyQA - インストラクター</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="header__title">easyQA - インストラクター</h1>
      <div class="header__actions">
        <button id="back-btn" class="btn btn--signout">メニューに戻る</button>
        <button id="signout-btn" class="btn btn--signout">サインアウト</button>
      </div>
    </header>

    <!-- エラーメッセージ表示エリア -->
    <div id="error-message" class="message"></div>

    <!-- 質問・回答一覧 -->
    <section>
      <h2 class="section-title">質問・回答一覧</h2>
      <div id="question-list"></div>
    </section>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/instructor.js"></script>
</body>
</html>
