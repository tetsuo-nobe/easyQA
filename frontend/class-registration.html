<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>easyQA - クラス登録</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="header__title">easyQA - クラス登録</h1>
      <div class="header__actions">
        <button id="back-btn" class="btn btn--signout">メニューに戻る</button>
        <button id="signout-btn" class="btn btn--signout">サインアウト</button>
      </div>
    </header>

    <!-- エラー・成功メッセージ -->
    <div id="error-message" class="message"></div>
    <div id="success-message" class="message"></div>

    <!-- クラス登録フォーム -->
    <section>
      <h2 class="section-title">クラス情報</h2>
      <form id="class-form">
        <div class="form-group">
          <label for="class-id">クラスID</label>
          <input type="text" id="class-id" name="classId" maxlength="50" placeholder="クラスIDを入力" required>
        </div>
        <div class="form-group">
          <label for="class-name">クラス名称</label>
          <input type="text" id="class-name" name="className" maxlength="100" placeholder="クラス名称を入力" required>
        </div>
        <div class="form-group">
          <label for="start-date">開始日</label>
          <input type="date" id="start-date" name="startDate" required>
        </div>
        <div class="form-group">
          <label for="end-date">最終日</label>
          <input type="date" id="end-date" name="endDate" required>
        </div>
        <div class="form-group">
          <label for="class-password">パスワード</label>
          <input type="password" id="class-password" name="password" maxlength="100" placeholder="パスワードを入力" required>
        </div>
        <button type="submit" id="register-btn" class="btn btn--primary">登録</button>
      </form>
    </section>

    <!-- 登録済みクラス一覧 -->
    <section class="class-list">
      <h2 class="class-list__title">登録済みクラス一覧</h2>
      <table class="class-table">
        <thead>
          <tr>
            <th>クラスID</th>
            <th>クラス名称</th>
            <th>開始日</th>
            <th>最終日</th>
          </tr>
        </thead>
        <tbody id="class-table-body"></tbody>
      </table>
    </section>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/class-registration.js"></script>
</body>
</html>
