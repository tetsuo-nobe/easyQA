AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: easyQA Backend - API Gateway + Lambda + DynamoDB

# Global settings
Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Resources:
  # ==================================================
  # DynamoDB Table Definitions
  # ==================================================

  # Users table: Manages instructor accounts
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: easyqa-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: instructorId
          AttributeType: S
      KeySchema:
        - AttributeName: instructorId
          KeyType: HASH

  # Classes table: Manages class information
  ClassesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: easyqa-classes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: classId
          AttributeType: S
      KeySchema:
        - AttributeName: classId
          KeyType: HASH

  # Questions table: Manages questions and answers
  QuestionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: easyqa-questions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: classId
          AttributeType: S
        - AttributeName: questionNumber
          AttributeType: N
      KeySchema:
        - AttributeName: classId
          KeyType: HASH
        - AttributeName: questionNumber
          KeyType: RANGE

  # ==================================================
  # Lambda Function Definitions
  # ==================================================

  # Authentication Lambda: POST /signin
  # Permissions: GetItem on Users table, GetItem on Classes table
  SigninFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: easyqa-signin
      Runtime: python3.13
      Handler: app.lambda_handler
      CodeUri: functions/signin/
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          CLASSES_TABLE: !Ref ClassesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !GetAtt UsersTable.Arn
                - !GetAtt ClassesTable.Arn
      Events:
        PostSignin:
          Type: Api
          Properties:
            Path: /signin
            Method: POST

  # Questions Lambda: GET/POST /questions
  # Permissions: Query, PutItem, GetItem on Questions table
  QuestionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: easyqa-questions
      Runtime: python3.13
      Handler: app.lambda_handler
      CodeUri: functions/questions/
      Environment:
        Variables:
          QUESTIONS_TABLE: !Ref QuestionsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt QuestionsTable.Arn
      Events:
        GetQuestions:
          Type: Api
          Properties:
            Path: /questions
            Method: GET
        PostQuestions:
          Type: Api
          Properties:
            Path: /questions
            Method: POST
        DeleteQuestion:
          Type: Api
          Properties:
            Path: /questions/{questionNumber}
            Method: DELETE

  # Answers Lambda: PUT /questions/{questionNumber}/answer
  # Permissions: GetItem, UpdateItem on Questions table
  AnswersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: easyqa-answers
      Runtime: python3.13
      Handler: app.lambda_handler
      CodeUri: functions/answers/
      Environment:
        Variables:
          QUESTIONS_TABLE: !Ref QuestionsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt QuestionsTable.Arn
      Events:
        PutAnswer:
          Type: Api
          Properties:
            Path: /questions/{questionNumber}/answer
            Method: PUT

  # Classes Lambda: GET/POST /classes, PUT /classes/{classId}
  # Permissions: PutItem, Scan, UpdateItem, GetItem on Classes table
  ClassesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: easyqa-classes
      Runtime: python3.13
      Handler: app.lambda_handler
      CodeUri: functions/classes/
      Environment:
        Variables:
          CLASSES_TABLE: !Ref ClassesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Scan
                - dynamodb:UpdateItem
                - dynamodb:GetItem
              Resource:
                - !GetAtt ClassesTable.Arn
      Events:
        GetClasses:
          Type: Api
          Properties:
            Path: /classes
            Method: GET
        PostClasses:
          Type: Api
          Properties:
            Path: /classes
            Method: POST
        PutClass:
          Type: Api
          Properties:
            Path: /classes/{classId}
            Method: PUT

# ==================================================
# Outputs
# ==================================================
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
